name: CI/CD Pipeline - Deploy React App to EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-todolist-new:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-todolist-new:${{ github.sha }} .
      
      # Step 4: Push Docker image to Docker Hub
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/react-todolist-new:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/react-todolist-new:${{ github.sha }}
      
      # Step 5: Deploy to EC2 via SSH
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop and remove old container if it exists
            docker stop myapp || true
            docker rm myapp || true
            
            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/react-todolist-new:latest
            
            # Run new container
            docker run -d -p 80:80 --name myapp --restart always ${{ secrets.DOCKER_USERNAME }}/react-todolist-new:latest
            
            # Clean up unused Docker images
            docker image prune -f